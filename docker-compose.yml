services:
  consoles:
    build:
      context: .
      dockerfile: Dockerfile
    image: consoles:latest
    container_name: consoles-app
    restart: unless-stopped
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.consoles.rule=Host(`consoles.dirtylab.fr`)"
      - "traefik.http.routers.consoles.entrypoints=websecure"
      - "traefik.http.routers.consoles.tls=true"
      - "traefik.http.routers.consoles.tls.certresolver=myresolver"
      - "traefik.http.services.consoles.loadbalancer.server.port=3000"

networks:
  traefik-net:
    external: true
